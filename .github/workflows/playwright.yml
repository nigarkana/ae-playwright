name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # automationexercise.com occasionally serves a bot-verification interstitial to
  # GitHub-hosted runner IPs, failing every test in the run even though the suite
  # is healthy. A same-job step retry reuses the same runner IP and hits the same
  # block, so instead re-run the whole job on a fresh runner (new IP) up to twice.
  retry-on-failure:
    needs: test
    if: failure() && github.run_attempt < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs on a fresh runner
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh run rerun ${{ github.run_id }} --failed
