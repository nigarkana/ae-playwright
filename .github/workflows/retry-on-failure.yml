name: Retry Failed Playwright Runs

# automationexercise.com occasionally serves a bot-verification interstitial to
# GitHub-hosted runner IPs, failing every test in the run even though the suite
# is healthy. A retry job inside the same run can't call `gh run rerun` on its
# own run (the API refuses while the run is still in progress), so this is a
# separate workflow that reacts to the run's completion and reruns failed jobs
# on a fresh runner (new IP), up to twice.
on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs on a fresh runner
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed
